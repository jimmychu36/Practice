        function playSound(type) {
          try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (type === 'correct') {
              oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
              gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
              gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
              oscillator.start();
              oscillator.stop(audioContext.currentTime + 0.3);
            } else {
              oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
              gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
              gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
              oscillator.start();
              oscillator.stop(audioContext.currentTime + 0.1);
            }
          } catch (e) { console.log('音效失敗'); }
        }

        // 雲端儲存功能
        async function saveProfile(name, data) {
          try {
            const payload = JSON.stringify({ name, ...data });
            const result = await storage.set('profile', payload);
            if (result) {
              showToast('✅', '已儲存到雲端');
              return true;
            }
          } catch (e) { console.error('儲存失敗:', e); }
          return false;
        }

        async function loadProfile() {
          try {
            const result = await storage.get('profile');
            if (result?.value) {
              const data = JSON.parse(result.value);
              userName = data.name || '';
              profile = {
                totalScore: data.totalScore || 0,
                totalRounds: data.totalRounds || 0,
                totalCorrect: data.totalCorrect || 0,
                totalQuestions: data.totalQuestions || 0,
                bestBySubject: data.bestBySubject || {},
                history: data.history || []
              };
              return true;
            }
          } catch (e) { console.error('載入失敗:', e); }
          return false;
        }

        // 排行榜功能
        async function saveToLeaderboard(name, totalScore, totalRounds) {
          try {
            const safeName = name.replace(/[^\w\u4e00-\u9fff]/g, '_').slice(0, 20);
            const data = JSON.stringify({
              name, score: totalScore, rounds: totalRounds, updated: Date.now()
            });
            await storage.set(`lb_${safeName}`, data, true);
            return true;
          } catch (e) { console.error('排行榜儲存失敗:', e); }
          return false;
        }

        async function loadLeaderboard() {
          try {
            const list = await storage.list('lb_', true);
            if (list?.keys) {
              const entries = [];
              for (const key of list.keys) {
                try {
                  const result = await storage.get(key.replace('shared_', ''), true);
                  if (result?.value) {
                    entries.push(JSON.parse(result.value));
                  }
                } catch {}
              }
              entries.sort((a, b) => b.score - a.score);
              leaderboard = entries.slice(0, 10);
              return true;
            }
          } catch (e) { console.error('排行榜載入失敗:', e); }
          return false;
        }

        // 開始測驗

        // 選擇答案 (包含連擊系統)
        function selectAnswer(answerIndex) {
          if (showingFeedback) return;
          
          playSound('click');
          selectedAnswer = answerIndex;
          showingFeedback = true;
          
          const q = currentQuiz[currentQuestion];
          const correct = answerIndex === q.answer;
          
          // 更新分類統計
          const cat = q.cat;
          if (!catStats[cat]) catStats[cat] = { correct: 0, total: 0 };
          catStats[cat].total++;
          
          if (correct) {
            catStats[cat].correct++;
            streak++;
            maxStreak = Math.max(maxStreak, streak);
            
            // 連擊獎勵系統！
            const basePoints = 10;
            const bonusPoints = streak >= 3 ? 5 : 0;
            const points = basePoints + bonusPoints;
            
            score += points;
            correctCount++;
            
            setTimeout(() => playSound('correct'), 100);
            
            if (bonusPoints > 0) {
              showToast('🔥', `連擊獎勵 +${bonusPoints}分！`);
            }
          } else {
            streak = 0;
            setTimeout(() => playSound('click'), 100);
          }
          
          renderQuiz();
        }

        // 下一題
        async function nextQuestion() {
          playSound('click');
          if (currentQuestion + 1 < currentQuiz.length) {
            currentQuestion++;
            selectedAnswer = null;
            showingFeedback = false;
            renderQuiz();
          } else {
            await finishQuiz();
          }
        }

        // 完成測驗 (更新檔案和排行榜)
        async function finishQuiz() {
          const percentage = Math.round((correctCount / currentQuiz.length) * 100);
          const currentBest = profile.bestBySubject[selectedSubject];
          isNewBest = !currentBest || score > currentBest.score;
          
          // 更新個人檔案
          if (isNewBest) {
            profile.bestBySubject[selectedSubject] = {
              score, grade: selectedGrade, percentage, date: Date.now()
            };
          }
          
          profile.totalScore += score;
          profile.totalRounds++;
          profile.totalCorrect += correctCount;
          profile.totalQuestions += currentQuiz.length;
          profile.history.unshift({
            date: Date.now(),
            subject: selectedSubject,
            grade: selectedGrade,
            score,
            correct: correctCount,
            total: currentQuiz.length,
            maxStreak
          });
          
          // 只保留最近20筆記錄
          if (profile.history.length > 20) {
            profile.history = profile.history.slice(0, 20);
          }
          
          // 儲存個人資料和排行榜
          await saveProfile(userName, profile);
          await saveToLeaderboard(userName, profile.totalScore, profile.totalRounds);
          await loadLeaderboard();
          
          renderResult();
        }

                          <span style="font-size: 13px; font-weight: 700; color: #5C4033;">${cat}</span>
                          <span style="font-size: 13px; font-weight: 800; color: ${allRight ? '#0E7263' : '#A0826D'};">
                            ${stats.correct}/${stats.total} ${allRight ? '✓' : ''}
                          </span>
                        </div>
                      `;
                    }).join('')}
                  </div>
                ` : ''}

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
                  <div style="background: white; border-radius: 14px; padding: 12px; text-align: center;">
                    <div style="font-size: 20px; margin-bottom: 4px;">🔥</div>
                    <div style="font-size: 11px; color: #A0826D; font-weight: 600;">最高連擊</div>
                    <div style="font-size: 20px; font-weight: 900; color: #5C4033;">${maxStreak}</div>
                  </div>
                  <div style="background: white; border-radius: 14px; padding: 12px; text-align: center;">
                    <div style="font-size: 20px; margin-bottom: 4px;">⭐</div>
                    <div style="font-size: 11px; color: #A0826D; font-weight: 600;">累積積分</div>
                    <div style="font-size: 20px; font-weight: 900; color: #5C4033;">${profile.totalScore}</div>
                  </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px;">
                  <button onclick="showRecords()" style="padding: 12px; font-size: 13px; font-weight: 700; color: #4ECDC4; background: white; border: 2px solid #E0F7F5; border-radius: 12px; cursor: pointer; font-family: inherit;">📊 紀錄</button>
                  <button onclick="showLeaderboard()" style="padding: 12px; font-size: 13px; font-weight: 700; color: #FFB347; background: white; border: 2px solid #FFF0D9; border-radius: 12px; cursor: pointer; font-family: inherit;">🏆 排行榜</button>
                  <button onclick="startQuiz()" style="padding: 12px; font-size: 13px; font-weight: 700; color: white; background: linear-gradient(135deg, #FF6B6B, #FF9966); border: none; border-radius: 12px; cursor: pointer; font-family: inherit;">🔄 再挑戰</button>
                </div>

                <button onclick="renderMenu()" style="width: 100%; padding: 12px; font-size: 14px; font-weight: 700; color: #A0826D; background: transparent; border: 2px solid #FFE5B4; border-radius: 12px; cursor: pointer; font-family: inherit;">
                  ← 回主選單
                </button>
              </div>
            </div>
          `;
          safeSetHTML('app', html);
        }

        // 顯示個人紀錄
        function showRecords() {
          playSound('click');
          
          const accuracy = profile.totalQuestions > 0 ? Math.round(profile.totalCorrect / profile.totalQuestions * 100) : 0;

          const html = `
            <div class="menu-card">
              <div style="background: linear-gradient(135deg, #4ECDC4, #44B8B0); padding: 20px; color: white; text-align: center;">
                <div style="font-size: 22px; font-weight: 900;">📊 我的紀錄</div>
                <div style="font-size: 14px; opacity: 0.9;">${userName} 的學習成果</div>
              </div>

              <div class="content">
                <div style="background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center;">
                  <div style="font-size: 36px; font-weight: 900; color: #4ECDC4; margin-bottom: 8px;">${profile.totalScore}</div>
                  <div style="font-size: 16px; font-weight: 700; color: #5C4033; margin-bottom: 16px;">總積分</div>
                  
                  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
                    <div>
                      <div style="font-size: 18px; font-weight: 900; color: #5C4033;">${profile.totalRounds}</div>
                      <div style="font-size: 12px; color: #A0826D; font-weight: 600;">總回合</div>
                    </div>
                    <div style="border-left: 1px solid #FFE5B4; border-right: 1px solid #FFE5B4;">
                      <div style="font-size: 18px; font-weight: 900; color: #5C4033;">${profile.totalCorrect}</div>
                      <div style="font-size: 12px; color: #A0826D; font-weight: 600;">答對題數</div>
                    </div>
                    <div>
                      <div style="font-size: 18px; font-weight: 900; color: #FF6B6B;">${accuracy}%</div>
                      <div style="font-size: 12px; color: #A0826D; font-weight: 600;">正確率</div>
                    </div>
                  </div>
                </div>

                ${Object.keys(profile.bestBySubject).length > 0 ? `
                  <div style="margin-bottom: 20px;">
                    <div style="font-size: 16px; font-weight: 800; color: #5C4033; margin-bottom: 12px;">🏆 各科最佳</div>
                    <div style="display: grid; gap: 8px;">
                      ${Object.entries(profile.bestBySubject).map(([subject, best]) => {
                        const meta = subjects[subject];
                        return `
                          <div style="background: white; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 12px;">
                            <div style="width: 32px; height: 32px; background: ${meta.bg}; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px;">${meta.icon}</div>
                            <div style="flex: 1;">
                              <div style="font-size: 14px; font-weight: 800; color: #5C4033;">${subject} ${best.grade}年級</div>
                              <div style="font-size: 12px; color: #A0826D;">${formatTime(best.date)}</div>
                            </div>
                            <div style="text-align: right;">
                              <div style="font-size: 16px; font-weight: 900; color: ${meta.color};">${best.score}</div>
                              <div style="font-size: 11px; color: #A0826D;">${best.percentage}%</div>
                            </div>
                          </div>
                        `;
                      }).join('')}
                    </div>
                  </div>
                ` : ''}

                <div style="margin-bottom: 20px;">
                  <div style="font-size: 16px; font-weight: 800; color: #5C4033; margin-bottom: 12px;">📚 最近記錄</div>
                  ${profile.history.length === 0 ? `
                    <div style="background: white; border-radius: 16px; padding: 24px; text-align: center;">
                      <div style="font-size: 36px; margin-bottom: 8px;">📝</div>
                      <div style="font-size: 14px; color: #A0826D;">還沒有記錄，快去挑戰吧！</div>
                    </div>
                  ` : `
                    <div style="background: white; border-radius: 16px; padding: 8px;">
                      ${profile.history.slice(0, 10).map((h, idx) => {
                        const meta = subjects[h.subject];
                        const pct = Math.round(h.correct / h.total * 100);
                        return `
                          <div style="padding: 10px 12px; display: flex; align-items: center; gap: 10px; ${idx < profile.history.length - 1 && idx < 9 ? 'border-bottom: 1px solid #FFF4E0;' : ''}">
                            <div style="width: 32px; height: 32px; background: ${meta.bg}; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px;">${meta.icon}</div>
                            <div style="flex: 1;">
                              <div style="font-size: 14px; font-weight: 800; color: #5C4033;">${h.subject} ${h.grade}年級</div>
                              <div style="font-size: 11px; color: #A0826D;">${formatTime(h.date)}</div>
                            </div>
                            <div style="text-align: right;">
                              <div style="font-size: 16px; font-weight: 900; color: ${meta.color};">+${h.score}</div>
                              <div style="font-size: 11px; color: #A0826D;">${h.correct}/${h.total} (${pct}%)</div>
                            </div>
                          </div>
                        `;
                      }).join('')}
                    </div>
                  `}
                </div>

                <button onclick="renderMenu()" style="width: 100%; padding: 16px; font-size: 16px; font-weight: 800; color: white; background: linear-gradient(135deg, #4ECDC4, #44B8B0); border: none; border-radius: 16px; cursor: pointer; font-family: inherit;">
                  ← 回主選單
                </button>
              </div>
            </div>
          `;
          safeSetHTML('app', html);
        }

        // 顯示排行榜
        function showLeaderboard() {
          playSound('click');
          
          const myRank = leaderboard.findIndex(e => e.name === userName) + 1;

          const html = `
            <div class="menu-card">
              <div style="background: linear-gradient(135deg, #FFB347, #FF9966); padding: 20px; color: white; text-align: center;">
                <div style="font-size: 22px; font-weight: 900;">🏆 全球排行榜</div>
                <div style="font-size: 14px; opacity: 0.9;">頂尖玩家競賽榜</div>
              </div>

              <div class="content">
                ${myRank > 0 ? `
                  <div style="background: linear-gradient(135deg, #FF6B6B, #FF9966); border-radius: 20px; padding: 18px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; color: white;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                      <div style="width: 40px; height: 40px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; color: #FF6B6B;">${myRank}</div>
                      <div>
                        <div style="font-size: 12px; opacity: 0.8;">你的排名</div>
                        <div style="font-size: 17px; font-weight: 800;">${userName}</div>
                      </div>
                    </div>
                    <div style="background: rgba(255,255,255,0.25); padding: 8px 14px; border-radius: 12px; font-weight: 800; font-size: 16px;">${profile.totalScore} 分</div>
                  </div>
                ` : ''}

                <div style="background: white; border-radius: 20px; padding: 8px;">
                  ${leaderboard.length === 0 ? `
                    <div style="text-align: center; padding: 40px 20px; color: #A0826D;">
                      <div style="font-size: 48px; margin-bottom: 12px;">🏆</div>
                      <div style="font-size: 15px; font-weight: 600;">還沒有人上榜<br>快來成為第一名！</div>
                    </div>
                  ` : leaderboard.map((entry, idx) => {
                      const isMe = entry.name === userName;
                      const rankIcons = ['👑', '🥈', '🥉'];
                      const rankBgs = ['#FFF9E6', '#F5F5F5', '#FAEBE0'];
                      
                      return `
                        <div style="padding: 12px 14px; background: ${idx < 3 ? rankBgs[idx] : (isMe ? '#FFE5E5' : 'transparent')}; border-radius: 14px; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; ${isMe ? 'border: 2px solid #FF6B6B;' : ''}">
                          <div style="width: 32px; display: flex; justify-content: center;">
                            ${idx < 3 ? `<span style="font-size: 20px;">${rankIcons[idx]}</span>` : `<span style="font-size: 16px; font-weight: 800; color: #A0826D;">${idx + 1}</span>`}
                          </div>
                          <div style="flex: 1;">
                            <div style="font-size: 15px; font-weight: 800; color: #5C4033;">
                              ${entry.name}${isMe ? ' (你)' : ''}
                            </div>
                            <div style="font-size: 11px; color: #A0826D; font-weight: 600;">
                              🎯 ${entry.rounds || 0} 回合
                            </div>
                          </div>
                          <div style="font-size: 17px; font-weight: 900; color: ${idx === 0 ? '#FFA500' : '#5C4033'};">${entry.score}</div>
                        </div>
                      `;
                    }).join('')}
                </div>

                <button onclick="loadLeaderboard(); showLeaderboard();" style="width: 100%; padding: 12px; margin: 16px 0; font-size: 14px; font-weight: 700; color: #A0826D; background: transparent; border: 2px solid #FFE5B4; border-radius: 14px; cursor: pointer; font-family: inherit;">
                  🔄 重新整理
                </button>

                <button onclick="renderMenu()" style="width: 100%; padding: 16px; font-size: 16px; font-weight: 800; color: white; background: linear-gradient(135deg, #FFB347, #FF9966); border: none; border-radius: 16px; cursor: pointer; font-family: inherit;">
                  ← 回主選單
                </button>
              </div>
            </div>
          `;
          safeSetHTML('app', html);
        }

        // 全域事件處理
        window.handleStart = handleStart;
        window.selectGrade = function(grade) { selectedGrade = grade; playSound('click'); renderMenu(); };
        window.selectSubject = function(subject) { selectedSubject = subject; playSound('click'); renderMenu(); };
        window.startQuiz = startQuiz;
        window.selectAnswer = selectAnswer;
        window.nextQuestion = nextQuestion;
        window.backToMenu = function() { playSound('click'); renderMenu(); };
        window.showRecords = showRecords;
        window.showLeaderboard = showLeaderboard;

        // 應用初始化
        async function initApp() {
          try {
            await loadProfile();
            await loadLeaderboard();
            renderWelcome();
          } catch (error) {
            console.error('初始化失敗:', error);
            renderWelcome();
          }
        }

        // 確保 DOM 完全載入後初始化
        setTimeout(() => {
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
          } else {
            initApp();
          }
        }, 1000);
    </script>
</body>
</html>
