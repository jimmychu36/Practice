          try {
            localStorage.setItem('playerProfile', JSON.stringify({
              name: playerName,
              profile: profile

            localStorage.setItem('gameRankings', JSON.stringify(rankings));
            return true;
          } catch { return false; }
        }

        function loadData() {
          try {
            const playerData = localStorage.getItem('playerProfile');
            if (playerData) {
              const data = JSON.parse(playerData);
              playerName = data.name || '';
              profile = data.profile || profile;
            }
            
            const rankData = localStorage.getItem('gameRankings');
            if (rankData) {

            }
            return true;
          } catch { return false; }
        }

        // === 音效 ===
        function beep(type) {
          try {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = type === 'ok' ? 523 : 330;
            gain.gain.value = 0.1;
            osc.start();
            osc.stop(ctx.currentTime + 0.2);
          } catch {}
        }

            `;
          }
        }

        // === 遊戲邏輯 ===
        function startGame() {
          if (profile.totalRounds === 0 && !playerName.trim()) return;
          beep('ok');
          if (profile.totalRounds === 0) {
            playerName = playerName.trim();
            saveData();
          }
          screen = 'menu';
          render();
        }

        function startQuiz() {
          const qs = allQuestions[subject][grade];
          if (!qs || qs.length === 0) {
            alert('該年級暫無題目');
            return;
          }
          
          beep('ok');
          quiz = [...qs].sort(() => Math.random() - 0.5).slice(0, 5);
          qIndex = 0;
          points = 0;
          correct = 0;
          selected = null;
          feedback = false;
          combo = 0;
          maxCombo = 0;
          
          screen = 'quiz';
          render();
        }

        function selectOpt(i) {
          if (feedback) return;
          beep('ok');
          selected = i;
          feedback = true;
          
          const q = quiz[qIndex];
          const isCorrect = i === q.ans;
          
          if (isCorrect) {
            combo++;
            maxCombo = Math.max(maxCombo, combo);
            const basePoints = 10;
            const bonusPoints = combo >= 3 ? 5 : 0;
            points += basePoints + bonusPoints;
            correct++;
            
            setTimeout(() => beep('ok'), 100);
          } else {
            combo = 0;
            setTimeout(() => beep('no'), 100);
          }
          
          render();
        }

        function nextQ() {
          beep('ok');
          qIndex++;
          selected = null;
          feedback = false;
          render();
        }

        function finishQuiz() {
          const isNewBest = !profile.bestScores[subject] || points > profile.bestScores[subject];
          
          if (isNewBest) {
            profile.bestScores[subject] = points;
          }
          
          profile.totalPoints += points;
          profile.totalRounds++;
          profile.totalCorrect += correct;
          profile.accuracy = Math.round((profile.totalCorrect / (profile.totalRounds * 5)) * 100);
          
          profile.recentGames.unshift({
            subject, grade, score: points, correct, total: quiz.length, date: Date.now()
          });
          if (profile.recentGames.length > 10) {
            profile.recentGames = profile.recentGames.slice(0, 10);
          }
          
          // 更新排行榜
          const existingIndex = rankings.findIndex(r => r.name === playerName);
          if (existingIndex >= 0) {
            rankings[existingIndex].score = profile.totalPoints;
            rankings[existingIndex].rounds = profile.totalRounds;
          } else {
            rankings.push({
              name: playerName,
              score: profile.totalPoints,
              rounds: profile.totalRounds
            });
          }
          rankings.sort((a, b) => b.score - a.score);
          rankings = rankings.slice(0, 10);
          
          saveData();
          screen = 'result';
          render();
        }

        function showRecords() {
          beep('ok');
          screen = 'records';
          render();
        }

        function showRankings() {
          beep('ok');
          screen = 'rankings';
          render();
        }

        // === 初始化 ===
        function init() {
          loadData();
          render();
        }

        // 確保載入完成後初始化
        setTimeout(init, 800);
    </script>
</body>
</html>
